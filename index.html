<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Project Manager PRO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #1e40af;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --secondary: #6b7280;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --border: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-light: #9ca3af;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #3b82f6;
                --primary-dark: #1e40af;
                --success: #10b981;
                --warning: #f59e0b;
                --danger: #ef4444;
                --secondary: #9ca3af;
                --bg-primary: #1f2937;
                --bg-secondary: #111827;
                --bg-tertiary: #374151;
                --border: #4b5563;
                --text-primary: #f3f4f6;
                --text-secondary: #d1d5db;
                --text-light: #9ca3af;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .btn-danger:hover {
            background: #dc2626;
            border-color: #dc2626;
        }

        .btn-success {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .btn-success:hover {
            background: #059669;
            border-color: #059669;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input[type="text"], select {
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            flex: 1;
            min-width: 150px;
        }

        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .project-card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .project-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .project-title {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
            flex: 1;
            word-break: break-word;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            margin-left: 8px;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-review {
            background: #dbeafe;
            color: #1e40af;
        }

        .status-approved {
            background: #dcfce7;
            color: #166534;
        }

        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            transition: width 0.3s;
        }

        .project-description {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .assignees {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .assignee {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 600;
            position: relative;
            border: 2px solid var(--bg-primary);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .assignee:hover {
            transform: scale(1.1);
        }

        .assignee-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            margin-bottom: 4px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            border: 1px solid var(--border);
        }

        .assignee:hover .assignee-tooltip {
            opacity: 1;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .priority-high {
            background: #fee2e2;
            color: #991b1b;
        }

        .priority-medium {
            background: #fef3c7;
            color: #92400e;
        }

        .priority-low {
            background: #dcfce7;
            color: #166534;
        }

        .project-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-light);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 8px;
            width: 100%;
            max-width: 700px;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .modal-header h2 {
            font-size: 20px;
            margin: 0;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
            padding: 0;
            width: 32px;
            height: 32px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        input[type="text"], input[type="date"], textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="text"]:focus, input[type="date"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .checklist-section {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 6px;
            margin: 16px 0;
        }

        .checklist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .checklist-header h4 {
            margin: 0;
            font-size: 14px;
            font-weight: 600;
        }

        .checklist-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            margin-bottom: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            border: 1px solid var(--border);
        }

        .checklist-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .checklist-item.completed {
            opacity: 0.6;
        }

        .checklist-item.completed label {
            text-decoration: line-through;
        }

        .checklist-item label {
            flex: 1;
            margin: 0;
            cursor: pointer;
            font-size: 14px;
        }

        .checklist-item button {
            padding: 4px 8px;
            font-size: 11px;
        }

        .new-checklist-input {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .new-checklist-input input {
            flex: 1;
            padding: 8px 12px;
            font-size: 14px;
        }

        .new-checklist-input button {
            padding: 8px 12px;
            font-size: 12px;
        }

        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .comments-section h3 {
            font-size: 16px;
            margin-bottom: 16px;
        }

        .comment {
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 6px;
        }

        .comment-author {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .comment-date {
            font-size: 12px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .comment-text {
            font-size: 14px;
            color: var(--text-primary);
        }

        .comment-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            min-height: 80px;
            resize: vertical;
        }

        .approval-section {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 6px;
            margin: 16px 0;
        }

        .approval-status {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .approval-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .action-buttons button {
            flex: 1;
        }

        .activity-section {
            background: var(--bg-secondary);
            padding: 16px;
            border-radius: 6px;
            margin: 16px 0;
        }

        .activity-item {
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .activity-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .activity-author {
            font-weight: 600;
            color: var(--text-primary);
        }

        .activity-action {
            color: var(--text-secondary);
        }

        .activity-time {
            color: var(--text-light);
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            border: 1px solid #fecaca;
        }

        .success {
            background: #dcfce7;
            color: #166534;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            border: 1px solid #bbf7d0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .modal-content {
                max-width: 100%;
            }

            header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .header-actions {
                width: 100%;
                flex-wrap: wrap;
            }

            .header-actions button {
                flex: 1;
                min-width: 100px;
            }

            .search-bar {
                flex-direction: column;
            }

            input[type="text"], select {
                min-width: auto;
            }

            .approval-buttons {
                flex-direction: column;
            }

            .approval-buttons button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Token Configuration Modal -->
    <div id="tokenModal" class="modal active">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>GitHub Setup Required</h2>
            </div>
            <div style="padding: 20px;">
                <p style="margin-bottom: 16px; color: var(--text-secondary);">
                    To use Team Project Manager PRO, you need to provide your GitHub Personal Access Token.
                </p>
                <div class="form-group">
                    <label>GitHub Personal Access Token</label>
                    <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxxx" style="font-family: monospace; letter-spacing: 1px;">
                    <p style="font-size: 12px; color: var(--text-light); margin-top: 8px;">
                        👉 <a href="https://github.com/settings/tokens/new" target="_blank" style="color: var(--primary);">Generate a token here</a> with 'repo' scope
                    </p>
                </div>

                <div class="form-group">
                    <label>Repository Owner</label>
                    <input type="text" id="ownerInput" placeholder="your-username" value="">
                </div>

                <div class="form-group">
                    <label>Repository Name</label>
                    <input type="text" id="repoInput" placeholder="Team-Project-Manager" value="">
                </div>

                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="saveTokenCheckbox">
                    <span style="font-size: 14px;">Remember token in this browser</span>
                </label>

                <button class="btn-primary" style="width: 100%; margin-top: 20px;" onclick="initializeToken()">Connect to GitHub</button>

                <p style="font-size: 12px; color: var(--text-light); margin-top: 16px; text-align: center;">
                    Your token is only stored locally in your browser.
                </p>
            </div>
        </div>
    </div>

    <div class="container" id="mainContainer" style="display: none;">
        <header>
            <h1>📋 Team Project Manager PRO</h1>
            <div class="header-actions">
                <button class="btn-primary" onclick="openCreateModal()">+ New Project</button>
                <button onclick="syncWithGitHub()">🔄 Sync</button>
                <button onclick="resetToken()">🔐 Change Token</button>
            </div>
        </header>

        <div id="messageContainer"></div>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search projects..." onkeyup="filterProjects()">
            <select id="statusFilter" onchange="filterProjects()">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="review">In Review</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
            </select>
            <select id="priorityFilter" onchange="filterProjects()">
                <option value="">All Priority</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>

        <div id="projectsContainer" class="projects-grid"></div>
    </div>

    <!-- Create Project Modal -->
    <div id="createModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Project</h2>
                <button class="close-btn" onclick="closeCreateModal()">×</button>
            </div>
            <form id="projectForm">
                <div class="form-group">
                    <label>Project Title</label>
                    <input type="text" id="projectTitle" placeholder="Enter project title" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="projectDescription" placeholder="Describe the project..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="projectPriority">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Deadline</label>
                        <input type="date" id="projectDeadline">
                    </div>
                </div>

                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="projectTags" placeholder="tag1, tag2, tag3">
                </div>

                <div style="display: flex; gap: 8px;">
                    <button type="submit" class="btn-primary" style="flex: 1;">Create Project</button>
                    <button type="button" onclick="closeCreateModal()" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Project Details Modal -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="detailsTitle"></h2>
                <button class="close-btn" onclick="closeDetailsModal()">×</button>
            </div>

            <div id="detailsContent">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>

    <script>
        let GITHUB_TOKEN = '';
        let REPO_OWNER = '';
        let REPO_NAME = '';

        let projects = [];
        let currentProject = null;
        let currentUsername = '';

        document.addEventListener('DOMContentLoaded', () => {
            loadSavedToken();
            document.getElementById('projectForm').addEventListener('submit', createProject);
        });

        function loadSavedToken() {
            const saved = localStorage.getItem('github-token');
            const owner = localStorage.getItem('github-owner');
            const repo = localStorage.getItem('github-repo');

            if (saved && owner && repo) {
                GITHUB_TOKEN = saved;
                REPO_OWNER = owner;
                REPO_NAME = repo;
                initializeApp();
            }
        }

        function initializeToken() {
            const token = document.getElementById('tokenInput').value.trim();
            const owner = document.getElementById('ownerInput').value.trim();
            const repo = document.getElementById('repoInput').value.trim();

            if (!token || !owner || !repo) {
                showMessage('All fields are required', 'error');
                return;
            }

            if (!token.startsWith('ghp_')) {
                showMessage('Invalid token format', 'error');
                return;
            }

            GITHUB_TOKEN = token;
            REPO_OWNER = owner;
            REPO_NAME = repo;

            if (document.getElementById('saveTokenCheckbox').checked) {
                localStorage.setItem('github-token', token);
                localStorage.setItem('github-owner', owner);
                localStorage.setItem('github-repo', repo);
            }

            document.getElementById('tokenModal').classList.remove('active');
            initializeApp();
        }

        function resetToken() {
            localStorage.removeItem('github-token');
            localStorage.removeItem('github-owner');
            localStorage.removeItem('github-repo');
            document.getElementById('tokenModal').classList.add('active');
            document.getElementById('mainContainer').style.display = 'none';
        }

        function initializeApp() {
            document.getElementById('mainContainer').style.display = 'block';
            loadProjects();
        }

        async function loadProjects() {
            try {
                showMessage('Loading projects...', 'info');
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues?state=all&per_page=100`,
                    {
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                if (!response.ok) throw new Error('Failed to load projects');

                projects = await response.json();
                renderProjects(projects);
                showMessage('Projects loaded', 'success');
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
                console.error(error);
            }
        }

        function renderProjects(projectList) {
            const container = document.getElementById('projectsContainer');

            if (projectList.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <h3>No projects yet</h3>
                        <p>Create your first project to get started</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = projectList.map(project => {
                const metadata = parseProjectMetadata(project.body);
                const status = metadata.status || 'pending';
                const priority = metadata.priority || 'medium';
                const tags = metadata.tags || [];
                const assignees = metadata.assignees || [];
                const checklist = metadata.checklist || [];
                const completed = checklist.filter(c => c.done).length;
                const total = checklist.length;
                const progress = total > 0 ? Math.round((completed / total) * 100) : 0;

                const initials = assignees.slice(0, 3).map(a => a.charAt(0).toUpperCase()).join('');

                return `
                    <div class="project-card" onclick="openDetailsModal(${project.number})">
                        <div class="project-header">
                            <h3 class="project-title">${escapeHtml(project.title)}</h3>
                            <span class="status-badge status-${status}">${status.toUpperCase()}</span>
                        </div>

                        ${total > 0 ? `
                            <div>
                                <div style="font-size: 12px; color: var(--text-light); margin-bottom: 4px;">${completed}/${total} tasks</div>
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        ` : ''}

                        <p class="project-description">${escapeHtml(metadata.description || '')}</p>

                        <div class="tags">
                            <span class="tag priority-${priority}">⚡ ${priority.charAt(0).toUpperCase() + priority.slice(1)}</span>
                            ${tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
                        </div>

                        ${assignees.length > 0 ? `
                            <div class="assignees">
                                ${assignees.map(a => `<div class="assignee" title="${a}">${a.charAt(0).toUpperCase()}</div>`).join('')}
                            </div>
                        ` : ''}

                        <div class="project-meta">
                            ${metadata.deadline ? `<div class="meta-item">📅 ${metadata.deadline}</div>` : ''}
                            <div class="meta-item">💬 ${project.comments}</div>
                        </div>

                        <div class="project-footer">
                            <span>By ${project.user.login}</span>
                            <span>${new Date(project.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function openDetailsModal(issueNumber) {
            try {
                const project = projects.find(p => p.number === issueNumber);
                if (!project) return;

                currentProject = project;
                const metadata = parseProjectMetadata(project.body);

                let detailsHTML = `
                    <div class="approval-section">
                        <div class="approval-status">Status: <strong>${metadata.status || 'Pending'}</strong></div>
                        <div class="approval-buttons">
                            <button class="btn-primary btn-small" onclick="updateProjectStatus('review')">In Review</button>
                            <button class="btn-success btn-small" onclick="updateProjectStatus('approved')">Approve</button>
                            <button class="btn-danger btn-small" onclick="updateProjectStatus('rejected')">Reject</button>
                        </div>
                    </div>

                    <div style="margin-bottom: 20px;">
                        <h3>Project Details</h3>
                        <p><strong>Description:</strong> ${escapeHtml(metadata.description || 'No description')}</p>
                        ${metadata.priority ? `<p><strong>Priority:</strong> ${metadata.priority.toUpperCase()}</p>` : ''}
                        ${metadata.deadline ? `<p><strong>Deadline:</strong> ${metadata.deadline}</p>` : ''}
                    </div>

                    ${metadata.assignees && metadata.assignees.length > 0 ? `
                        <div style="margin-bottom: 20px;">
                            <h3>Team Members</h3>
                            <div class="assignees" style="gap: 12px;">
                                ${metadata.assignees.map(a => `<div class="assignee" style="width: 40px; height: 40px; font-size: 14px;" title="${a}">${a.charAt(0).toUpperCase()}</div>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                `;

                // Checklist Section
                if (metadata.checklist && metadata.checklist.length > 0) {
                    const completed = metadata.checklist.filter(c => c.done).length;
                    detailsHTML += `
                        <div class="checklist-section">
                            <div class="checklist-header">
                                <h4>Checklist (${completed}/${metadata.checklist.length})</h4>
                            </div>
                            <div class="progress-bar" style="margin-bottom: 12px;">
                                <div class="progress-fill" style="width: ${Math.round((completed / metadata.checklist.length) * 100)}%"></div>
                            </div>
                            ${metadata.checklist.map((item, idx) => `
                                <div class="checklist-item ${item.done ? 'completed' : ''}">
                                    <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggleChecklistItem(${idx})">
                                    <label>${escapeHtml(item.text)}</label>
                                    <button class="btn-danger btn-small" onclick="deleteChecklistItem(${idx})">Delete</button>
                                </div>
                            `).join('')}
                            <div class="new-checklist-input">
                                <input type="text" id="newChecklistItem" placeholder="Add a new task...">
                                <button class="btn-primary" onclick="addChecklistItem()">Add</button>
                            </div>
                        </div>
                    `;
                } else {
                    detailsHTML += `
                        <div class="checklist-section">
                            <div class="checklist-header">
                                <h4>Checklist</h4>
                            </div>
                            <div class="new-checklist-input">
                                <input type="text" id="newChecklistItem" placeholder="Add your first task...">
                                <button class="btn-primary" onclick="addChecklistItem()">Add</button>
                            </div>
                        </div>
                    `;
                }

                // Comments Section
                detailsHTML += `
                    <div class="comments-section">
                        <h3>Comments (${project.comments})</h3>
                        <div id="commentsList"></div>

                        <div style="margin-top: 16px;">
                            <textarea id="newComment" class="comment-input" placeholder="Add a comment..."></textarea>
                            <button class="btn-primary" style="width: 100%; margin-top: 8px;" onclick="addComment()">Add Comment</button>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-danger" onclick="deleteProject()">🗑️ Delete Project</button>
                    </div>
                `;

                document.getElementById('detailsTitle').textContent = project.title;
                document.getElementById('detailsContent').innerHTML = detailsHTML;

                await loadComments(issueNumber);

                document.getElementById('detailsModal').classList.add('active');
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function loadComments(issueNumber) {
            try {
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${issueNumber}/comments`,
                    {
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                const comments = await response.json();
                const commentsList = document.getElementById('commentsList');

                if (comments.length === 0) {
                    commentsList.innerHTML = '<p style="color: var(--text-light); font-size: 14px;">No comments yet</p>';
                    return;
                }

                commentsList.innerHTML = comments.map(comment => `
                    <div class="comment">
                        <div class="comment-author">${comment.user.login}</div>
                        <div class="comment-date">${new Date(comment.created_at).toLocaleString()}</div>
                        <div class="comment-text">${escapeHtml(comment.body)}</div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading comments:', error);
            }
        }

        async function addComment() {
            const commentText = document.getElementById('newComment').value.trim();
            if (!commentText || !currentProject) return;

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${currentProject.number}/comments`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({ body: commentText })
                    }
                );

                if (!response.ok) throw new Error('Failed to add comment');

                document.getElementById('newComment').value = '';
                await loadComments(currentProject.number);
                showMessage('Comment added', 'success');
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function addChecklistItem() {
            const itemText = document.getElementById('newChecklistItem').value.trim();
            if (!itemText || !currentProject) return;

            const metadata = parseProjectMetadata(currentProject.body);
            if (!metadata.checklist) metadata.checklist = [];

            metadata.checklist.push({ text: itemText, done: false });

            await updateProject(metadata);
            document.getElementById('newChecklistItem').value = '';
            await openDetailsModal(currentProject.number);
            showMessage('Task added', 'success');
        }

        async function toggleChecklistItem(index) {
            const metadata = parseProjectMetadata(currentProject.body);
            if (metadata.checklist && metadata.checklist[index]) {
                metadata.checklist[index].done = !metadata.checklist[index].done;
                await updateProject(metadata);
                await openDetailsModal(currentProject.number);
            }
        }

        async function deleteChecklistItem(index) {
            const metadata = parseProjectMetadata(currentProject.body);
            if (metadata.checklist) {
                metadata.checklist.splice(index, 1);
                await updateProject(metadata);
                await openDetailsModal(currentProject.number);
                showMessage('Task deleted', 'success');
            }
        }

        async function createProject(e) {
            e.preventDefault();

            const title = document.getElementById('projectTitle').value.trim();
            const description = document.getElementById('projectDescription').value.trim();
            const priority = document.getElementById('projectPriority').value;
            const deadline = document.getElementById('projectDeadline').value;
            const tags = document.getElementById('projectTags').value.split(',').map(t => t.trim()).filter(t => t);

            if (!title) {
                showMessage('Project title is required', 'error');
                return;
            }

            try {
                const body = `${description}

---
**Metadata:**
- Status: pending
- Priority: ${priority}
- Deadline: ${deadline || 'None'}
- Assignees: []
- Tags: ${tags.join(', ') || 'None'}
- Checklist: []`;

                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({
                            title: title,
                            body: body,
                            labels: [priority, ...tags]
                        })
                    }
                );

                if (!response.ok) throw new Error('Failed to create project');

                showMessage('Project created', 'success');
                closeCreateModal();
                document.getElementById('projectForm').reset();
                await loadProjects();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function updateProject(metadata) {
            if (!currentProject) return;

            try {
                const body = buildProjectBody(metadata);

                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${currentProject.number}`,
                    {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({ body: body })
                    }
                );

                if (!response.ok) throw new Error('Failed to update project');

                await loadProjects();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        async function updateProjectStatus(newStatus) {
            if (!currentProject) return;

            const metadata = parseProjectMetadata(currentProject.body);
            metadata.status = newStatus;

            await updateProject(metadata);
            showMessage('Status updated', 'success');
            await openDetailsModal(currentProject.number);
        }

        async function deleteProject() {
            if (!currentProject) return;

            if (!confirm('Are you sure you want to delete this project? This cannot be undone.')) return;

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/issues/${currentProject.number}`,
                    {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `token ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify({ state: 'closed' })
                    }
                );

                if (!response.ok) throw new Error('Failed to delete project');

                showMessage('Project deleted', 'success');
                closeDetailsModal();
                await loadProjects();
            } catch (error) {
                showMessage('Error: ' + error.message, 'error');
            }
        }

        function parseProjectMetadata(body) {
            const metadata = {
                description: '',
                status: 'pending',
                priority: 'medium',
                deadline: '',
                assignees: [],
                tags: [],
                checklist: []
            };

            if (!body) return metadata;

            const lines = body.split('\n');
            let inMetadata = false;
            let descLines = [];

            for (let line of lines) {
                if (line.includes('**Metadata:**')) {
                    inMetadata = true;
                    continue;
                }

                if (inMetadata && line.startsWith('-')) {
                    if (line.includes('Status:')) {
                        metadata.status = line.split('Status:')[1].trim();
                    } else if (line.includes('Priority:')) {
                        metadata.priority = line.split('Priority:')[1].trim();
                    } else if (line.includes('Deadline:')) {
                        const deadline = line.split('Deadline:')[1].trim();
                        if (deadline !== 'None') metadata.deadline = deadline;
                    } else if (line.includes('Assignees:')) {
                        const assigneesStr = line.split('Assignees:')[1].trim();
                        if (assigneesStr !== 'None' && assigneesStr !== '[]') {
                            const parsed = JSON.parse(assigneesStr);
                            metadata.assignees = Array.isArray(parsed) ? parsed : [];
                        }
                    } else if (line.includes('Tags:')) {
                        const tagsStr = line.split('Tags:')[1].trim();
                        if (tagsStr !== 'None') {
                            metadata.tags = tagsStr.split(',').map(t => t.trim());
                        }
                    } else if (line.includes('Checklist:')) {
                        const checklistStr = line.split('Checklist:')[1].trim();
                        if (checklistStr !== '[]' && checklistStr !== 'None') {
                            try {
                                metadata.checklist = JSON.parse(checklistStr);
                            } catch (e) {
                                metadata.checklist = [];
                            }
                        }
                    }
                } else if (!inMetadata && !line.includes('---')) {
                    descLines.push(line);
                }
            }

            metadata.description = descLines.join('\n').trim();
            return metadata;
        }

        function buildProjectBody(metadata) {
            return `${metadata.description}

---
**Metadata:**
- Status: ${metadata.status}
- Priority: ${metadata.priority}
- Deadline: ${metadata.deadline || 'None'}
- Assignees: ${JSON.stringify(metadata.assignees)}
- Tags: ${metadata.tags.length > 0 ? metadata.tags.join(', ') : 'None'}
- Checklist: ${JSON.stringify(metadata.checklist)}`;
        }

        function filterProjects() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const priorityFilter = document.getElementById('priorityFilter').value;

            const filtered = projects.filter(project => {
                const metadata = parseProjectMetadata(project.body);
                const status = metadata.status || 'pending';
                const priority = metadata.priority || 'medium';

                const matchesSearch = project.title.toLowerCase().includes(searchTerm) ||
                    metadata.description.toLowerCase().includes(searchTerm);
                const matchesStatus = !statusFilter || status === statusFilter;
                const matchesPriority = !priorityFilter || priority === priorityFilter;

                return matchesSearch && matchesStatus && matchesPriority;
            });

            renderProjects(filtered);
        }

        function openCreateModal() {
            document.getElementById('createModal').classList.add('active');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
        }

        function closeDetailsModal() {
            document.getElementById('detailsModal').classList.remove('active');
            currentProject = null;
        }

        async function syncWithGitHub() {
            showMessage('Syncing...', 'info');
            await loadProjects();
        }

        function showMessage(message, type = 'info') {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = message;
            container.appendChild(div);

            setTimeout(() => {
                div.remove();
            }, 4000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
